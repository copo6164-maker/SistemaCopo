<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SistemaCopo - Dashboard Principal</title>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Importación de Chart.js para los gráficos dinámicos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- MENÚ LATERAL (SIDEBAR UNIFICADO) -->
    <aside>
        <img src="../assets/img/logoCopo.png" alt="Logo" class="logo-img">
        <h2 style="font-size: 1.2rem; margin-bottom: 20px; color: white;">SistemaCopo</h2>
        <nav>
            <a href="index.html">Dashboard Principal</a>
            <a href="pendientes.html">Pendientes Generales</a>
        </nav>
        <button onclick="cerrarSesion()" class="btn-logout">Cerrar sesión</button>
    </aside>

    <!-- ÁREA DE CONTENIDO CENTRAL -->
    <main>
        <h1>Dashboard Principal</h1>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">Monitoreo en tiempo real del B/O El Puma</p>
        
        <!-- Cuadrícula de Tarjetas de Indicadores Conectados a Firebase -->
        <div class="metrics-grid">
            <div class="metric-card">
                <h4>Requisiciones Activas</h4>
                <p id="txtActivas">0</p>
            </div>
            <div class="metric-card" style="border-left-color: #ef4444;">
                <h4>Sin Cotizar</h4>
                <p id="txtSinCotizar" style="color: #ef4444;">0</p>
            </div>
            <div class="metric-card" style="border-left-color: #f59e0b;">
                <h4>Cotización Incompleta</h4>
                <p id="txtIncompleta" style="color: #f59e0b;">0</p>
            </div>
            <div class="metric-card" style="border-left-color: #10b981;">
                <h4>Solicitud Compra</h4>
                <p id="txtSolicitud" style="color: #10b981;">0</p>
            </div>
        </div>

        <!-- Bloque Visual de Gráficos Automatizados -->
        <div class="finance-charts">
            <div class="chart-box">
                <h3>Distribución por Departamento</h3>
                <canvas id="areaChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Requisiciones por Origen</h3>
                <canvas id="originChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Eficiencia (Listos vs Pendientes)</h3>
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </main>

    <!-- LÓGICA DE AUTOMATIZACIÓN DE FIREBASE EN TIEMPO REAL -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Configuración de tu proyecto de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA1g6pT_M76Pf9WSre1a7v-E773hFetkKw",
            authDomain: "sistemacopo-171ca.firebaseapp.com",
            projectId: "sistemacopo-171ca",
            storageBucket: "sistemacopo-171ca.firebasestorage.app",
            messagingSenderId: "193935838790",
            appId: "1:193935838790:web:40075e51d34af011fa8447",
            measurementId: "G-Y4S9PTPRG3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });

        window.cerrarSesion = async () => {
            await signOut(auth);
            window.location.href = "login.html";
        };

        /* ==========================================================================
           1. INICIALIZACIÓN DE GRÁFICOS VACÍOS (CHART.JS)
           ========================================================================== */
        
        // Gráfico 1: Por Departamento (Pie)
        const areaChart = new Chart(document.getElementById('areaChart'), {
            type: 'pie',
            data: {
                labels: ['Máquinas', 'Cubierta', 'Base'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#002147', '#C9A227', '#64748b']
                }]
            }
        });

        // Gráfico 2: Por Origen Solicitante (Barra) - Reemplaza al proveedor estático
        const originChart = new Chart(document.getElementById('originChart'), {
            type: 'bar',
            data: {
                labels: ['B/O El Puma', 'Base Pacífico', 'Oficina Central'],
                datasets: [{
                    label: 'Cantidad de Requisiciones',
                    data: [0, 0, 0],
                    backgroundColor: '#002147'
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });

        // Gráfico 3: Estado del Trabajo (Dona)
        const statusChart = new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: {
                labels: ['Completados', 'Pendientes'],
                datasets: [{
                    data: [0, 0],
                    backgroundColor: ['#10b981', '#ef4444']
                }]
            }
        });

        /* ==========================================================================
           2. ESCUCHA DE DATOS EN TIEMPO REAL (FIRESTORE)
           ========================================================================== */
        onSnapshot(collection(db, "tareas"), (snapshot) => {
            const dataDocs = snapshot.docs.map(doc => doc.data());

            // Variables contadoras para las Tarjetas de Métricas
            let activas = 0;
            let sinCotizar = 0;
            let incompleta = 0;
            let solicitudCompra = 0;

            // Variables para el Gráfico de Departamentos
            let deptoMaquinas = 0;
            let deptoCubierta = 0;
            let deptoBase = 0;

            // Variables para el Gráfico de Origen
            let origPuma = 0;
            let origPacifico = 0;
            let origCentral = 0;

            // Variables para el Gráfico de Eficiencia
            let totalCompletados = 0;
            let totalPendientes = 0;

            // Procesar y clasificar cada documento guardado en la base de datos
            dataDocs.forEach(item => {
                
                if (item.status === 'Completado') {
                    totalCompletados++;
                } else if (item.status === 'Pendiente') {
                    totalPendientes++;
                    activas++;

                    // Mapeo inteligente según la cotización capturada en el formulario dinámico
                    if (item.cotizacion === 'Provisional') {
                        incompleta++;
                    } else if (item.cotizacion === 'Final') {
                        solicitudCompra++;
                    } else {
                        sinCotizar++; // Si no se especificó o es un pendiente general antiguo
                    }

                    // Clasificación por departamento para el gráfico de Pastel
                    if (item.departamento === 'Máquinas') deptoMaquinas++;
                    else if (item.departamento === 'Cubierta') deptoCubierta++;
                    else if (item.departamento === 'Base') deptoBase++;

                    // Clasificación por ubicación de origen para el gráfico de Barras
                    if (item.area === 'B/O El Puma') origPuma++;
                    else if (item.area === 'Base Pacífico') origPacifico++;
                    else if (item.area === 'Oficina Central') origCentral++;
                }
            });

            /* ==========================================================================
               3. ACTUALIZACIÓN DINÁMICA DE LA INTERFAZ
               ========================================================================== */
            
            // Inyectar los totales en las tarjetas HTML
            document.getElementById('txtActivas').innerText = activas;
            document.getElementById('txtSinCotizar').innerText = sinCotizar;
            document.getElementById('txtIncompleta').innerText = incompleta;
            document.getElementById('txtSolicitud').innerText = solicitudCompra;

            // Actualizar datos del gráfico de pastel (Departamentos)
            areaChart.data.datasets[0].data = [deptoMaquinas, deptoCubierta, deptoBase];
            areaChart.update();

            // Actualizar datos del gráfico de barras (Origen de Requisición)
            originChart.data.datasets[0].data = [origPuma, origPacifico, origCentral];
            originChart.update();

            // Actualizar datos del gráfico de dona (Eficiencia del Sistema)
            statusChart.data.datasets[0].data = [totalCompletados, totalPendientes];
            statusChart.update();
        });
    </script>

</body>
</html>
