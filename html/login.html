<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SistemaCopo - Login</title>
    <link rel="stylesheet" href="../css/style.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #001630;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            width: 380px;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            text-align: center;
        }

        .login-card img {
            width: 110px;
            margin-bottom: 15px;
        }

        .login-card h1 {
            color: #002147;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .login-card p {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .btn-login {
            width: 100%;
            background: #002147;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #003366;
        }

        .error {
            margin-top: 15px;
            color: #ef4444;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="../assets/img/logoCopo.png" alt="Logo COPO">
        <h1>SistemaCopo</h1>
        <p>Inicio de sesión</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Correo electrónico:</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Contraseña:</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>

            <div id="errorMsg" class="error"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1g6pT_M76Pf9WSre1a7v-E773hFetkKw",
            authDomain: "sistemacopo-171ca.firebaseapp.com",
            projectId: "sistemacopo-171ca",
            storageBucket: "sistemacopo-171ca.firebasestorage.app",
            messagingSenderId: "193935838790",
            appId: "1:193935838790:web:40075e51d34af011fa8447",
            measurementId: "G-Y4S9PTPRG3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "index.html";
            }
        });

        const loginForm = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMsg");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html";
            } catch (error) {
                errorMsg.textContent = "Correo o contraseña incorrectos.";
                console.error(error);
            }
        });
    </script>

</body>
</html>
